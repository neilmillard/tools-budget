name: Deployment Workflow

# Trigger this workflow on pushes to the specified branch
on:
  push:
    branches:
      - main
  schedule:
    - cron: 12 10 * * SUN

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: npm install

      - name: Test Next.js app
        run: npm test

      - name: Create Env file
        # create unexpected and undefined parameters - https://github.com/SpicyPizza/create-envfile/issues/10
        uses: SpicyPizza/create-envfile@v2.0.3
        with:
          envkey_NEXT_PUBLIC_ADSENSE_PUB_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_PUB_ID }}
          envkey_NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          envkey_NEXT_PUBLIC_FMP_API_KEY: ${{ secrets.NEXT_PUBLIC_FMP_API_KEY }}
          file-name: .env

      # Deployment is handled by Cloudflare Pages' own GitHub integration,
      # which builds and publishes `out/` on every push to main — no deploy
      # step is needed here. This job just keeps main green.
